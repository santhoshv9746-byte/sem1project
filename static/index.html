<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ToolShare Admin Platform</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>ToolShare Administration</h1>
    <hr>

    <h2>1. Add New Tool</h2>
    <form id="toolForm">
        <input type="text" id="toolName" placeholder="Tool Name" required>
        <input type="text" id="toolCategory" placeholder="Category" required>
        <button type="submit">Save Tool</button>
    </form>

    
    <h2>2. Add New User</h2>
    <form id="userForm">
        <input type="text" id="newUserName" placeholder="User Name" required>
        <input type="text" id="newUserID" placeholder="User ID" required>
        <button type="submit">Add User</button>
    </form>


    <hr>
    <h2>3. Active User Directory</h2>
    <div id="userList"></div>
    <hr>
    <h2>4. Tool Inventory</h2>
    <input type="text" id="searchBar" placeholder="Search by name...">
    <div id="inventoryContainer" style="margin-top: 15px;"></div>
    <script src="/static/app.js"></script>
</body>
</html>
